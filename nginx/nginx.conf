upstream django {
    server web:8000;  # Gunicorn qui sert Django
}

server {
    listen 80;

    # Fichiers statiques (CSS, JS, images de design)
    location /static/ {
        alias /app/staticfiles/;   # STATIC_ROOT sur le serveur
        # Options utiles
        autoindex off;
        expires 30d;               # cache navigateur
    }

    # Fichiers médias (uploads utilisateurs)
    location /media/ {
        alias /app/couvertures/;   # MEDIA_ROOT sur le serveur
        autoindex off;
        expires 30d;               # cache navigateur
    }

    # Tout le reste → Django via Gunicorn
    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}