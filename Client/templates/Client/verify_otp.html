{% load static %}
<!doctype html>
<html>
  <head>
    <title>Verify OTP</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div
      class="min-h-screen flex items-center justify-center bg-base-100 px-4"
      data-theme="silk"
    >
      <div
        class="bg-white p-8 rounded-xl shadow-xl w-full max-w-md flex flex-col items-center"
      >
        <div class="flex items-center mb-6 w-full">
          <img
            src="{% static 'images/logo.png' %}"
            alt="Logo"
            class="w-16 h-16 object-contain mr-4"
          />
          <div class="flex flex-col">
            <h2 class="text-2xl font-extrabold text-gray-800">
              Vérification du code
            </h2>
            <p class="text-gray-500 text-sm sm:text-base" >{{ mask_email }}</p>
          </div>
        </div>

        <form
          method="POST"
          action="{% url 'client:verify_otp' %}?token={{ token }}"
          class="w-full flex flex-col gap-4"
        >
            {% csrf_token %}
          <input
            type="text"
            placeholder="Code OTP (ex: 123456)"
            name="otp_code"
            class="w-full p-3 text-center tracking-widest text-lg border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary transition"
          />
          <p class="text-sm text-gray-500">
            Code OTP expirera dans : <span id="otp-timer"></span> minutes
          </p>

          <script>
            // مدة الـ OTP بالثواني (مثال: 15 دقائق)
            let timeLeft = 15 * 60;

            const timerElement = document.getElementById("otp-timer");

            function updateTimer() {
              const minutes = Math.floor(timeLeft / 60);
              const seconds = timeLeft % 60;
              timerElement.textContent = `${minutes}:${seconds < 10 ? "0" : ""}${seconds}`;
              if (timeLeft > 0) {
                timeLeft--;
              } else {
                clearInterval(timerInterval);
                timerElement.textContent = "Expiré";
              }
            }

            updateTimer(); // تحديث أولي
            const timerInterval = setInterval(updateTimer, 1000);
          </script>
          <div class="flex gap-4 justify-between mt-2">
            <a
              href="{% url 'client:client_login' %}"
              class="btn btn-outline btn-secondary flex-1"
            >
              Annuler
            </a>

            <button type="submit" class="btn btn-primary flex-1">
              Vérifier le code
            </button>
          </div>
        </form>
    <!--disabled="timeLeft > 0"-->
    <form method="POST" action="{%url 'client:renvoyer_otp'%}">

        {% csrf_token %}
        <input type="email" name="email" class="hidden" value="{{email}}">
        <button type="submit"
          class="mt-4 text-sm text-primary hover:underline"
        >
          Renvoyer le code
        </button></from>
      </div>
    </div>
  </body>
</html>
