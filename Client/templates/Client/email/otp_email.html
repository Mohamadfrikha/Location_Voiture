<table width="100%" cellpadding="0" cellspacing="0" style="background:#f8fafc; padding:20px; font-family:Arial, sans-serif;">
  <tr>
    <td align="center">
      
      <table width="500" cellpadding="0" cellspacing="0" style="background:#ffffff; border-radius:1rem; overflow:hidden; box-shadow:0 4px 6px rgba(0,0,0,0.1);">
        
        <!-- Header -->
        <tr>
          <td style="background:#f0e6f6; color:#4f46e5; padding:20px; text-align:center; font-size:22px; font-weight:bold;">
            🔐 Vérification de votre compte
          </td>
        </tr>

        <!-- Content -->
        <tr>
          <td style="padding:30px; color:#334155; text-align:center;">
            
            <h2 style="margin-bottom:10px; font-size:20px; font-weight:bold;">Bonjour {{ user }}</h2>

            <p style="margin-bottom:25px; font-size:16px;">
              Utilisez le code suivant pour vérifier votre compte :
            </p>

            <!-- OTP BOX -->
            <div style="margin:20px auto; font-size:32px; font-weight:bold; letter-spacing:6px; color:#4f46e5; background:#f3e8ff; padding:15px 25px; border-radius:0.5rem; display:inline-block;">
              {{ otp }}
            </div>

            <p style="margin-top:25px; font-size:14px; color:#64748b;">
              Ce code expire dans 15 minutes.
            </p>

          </td>
        </tr>

        <!-- Footer -->
        <tr>
          <td style="background:#f8fafc; text-align:center; padding:15px; font-size:12px; color:#64748b;">
            Si vous n’avez pas demandé ce code, ignorez cet email.
          </td>
        </tr>

      </table>

    </td>
  </tr>
</table>
