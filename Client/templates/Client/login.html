{%load static%}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion</title>
    <!-- DaisyUI + Tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet"/>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <div class="min-h-screen flex items-center justify-center px-4 bg-base-100" data-theme="silk">

  <div class="bg-white card lg:card-side  shadow-2xl max-w-4xl w-full">
    <figure class="relative lg:w-1/2">
      <img
        src="https://la-voiture.fr/wp-content/uploads/2025/02/voiture-location.webp"
        alt="Hospital system"
        class="h-full w-full object-cover"
      />

      <div class="absolute inset-0 bg-black/40 flex flex-col items-center justify-center text-center px-4">
        <h2 class="text-3xl font-bold text-base-100 mb-2">
          Accès au système  Location de Voitures
        </h2>
        <p class="text-base-200 text-sm max-w-md">
          Veuillez vous connecter pour accéder à la plateforme sécurisée.
        </p>
      </div>
    </figure>

    <div class="card-body lg:w-1/2 text-base-content">
        <div class="flex items-center justify-center gap-3 mb-4">
      <img src="{% static 'images/logo.png' %}" alt="Logo" class="w-40 h-auto">
  
    </div>
      <h1 class="text-2xl font-bold text-center mb-4 text-primary">
        Connexion
      </h1>

       {% if error %}
        <div class="alert alert-error mb-4">
          <div>
            <svg xmlns="http://www.w3.org/2000/svg" class="stroke-current flex-shrink-0 h-6 w-6" fill="none" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
            <span>{{ error }}</span>
          </div>
        </div>
      {% endif %}
        <form method="POST" action="{% url 'client:client_login' %}">
        {% csrf_token %}
      <fieldset class="fieldset">
        <label class="label">
          <span class="label-text">Email</span>
        </label>
        <input
          type="email"
          class="input input-bordered w-full  bg-white"
          placeholder="Email"
            name="email"
        />

        <label class="label">
          <span class="label-text">Mot de passe</span>
        </label>
        <input
          type="password"
          name="password"
          class="input input-bordered w-full bg-white"
          placeholder="Mot de passe"
          
        />

        <div class="flex justify-end">
          <a
            class="link link-primary text-sm"
             href="#"
          >
            Mot de passe oublié ?
          </a>
        </div>

        <button class="btn btn-primary mt-4 w-full" type="submit" >
          Se connecter
        </button>
        </form>
        <a href="{% url 'client:client_create' %}" 
            class="btn btn-outline btn-secondary mt-2 w-full">
            Créer un compte
            </a>
      </fieldset>
    </div>
  </div>
</div>
</body>
</html>
